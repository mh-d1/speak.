<html>
	<head>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
	</head>
	<body
		style="
			margin:0;
            font-family: Roboto;
		"
	>
        <!-- Master Container -->
		<div
			style="
				width:100%;
				height:100%;
				display:flex;
			"
		>
            <!-- Left -->
			<div
				style="
					flex:1;
                    display: flex;
                    justify-content: center;
                    align-items: center;
				"
			>
				<img
                    style="
                        width:100%;
                        height:100%;
                        object-fit: cover;
                    "
                    src="homepage_resized.jpg"
                />
			</div>
            <!-- Right -->
			<div
				style="
					background:black;
					flex:1.5;
                    display: flex;
                    justify-content: center;
                    align-items: center;
				"
			>
                <!-- Center container -->
				<div
                    style="
                        color:white;
                        display: flex;
                        flex-direction: column;
                        gap:15px;
                        padding:10px;
                        position:relative
                    "
                >
                    <!-- Happening now-->
                    <div
                        style="
                            font-size:60px;
                            font-weight: 800;
                            letter-spacing: -1px;
                        "
                    >
                        Happening now
                    </div>
                    <!-- Join today -->
                    <div
                        style="
                            font-size: 30px;
                            font-weight: 600;
                            letter-spacing: -1px;
                        "
                    >
                        Join today or never.
                    </div>
                    <!-- Input -->
                    <div
                        style="
                            display: flex;
                            flex-direction: column;
                            gap:10px;
                        "
                    >
                        <!-- Username -->
                        <input
                            class="input-username"
                            style="
                                background: black;
                                color:white;
                                padding:10px 20px;
                                border:1px solid grey;
                                border-radius: 20px;
                            "
                            placeholder="Username"
                        />
                        <!-- Password -->
                        <input
                            class="input-password"
                            style="
                                background: black;
                                color:white;
                                padding:10px 20px;
                                border:1px solid grey;
                                border-radius: 20px;
                            "
                            placeholder="Password"
                            type="password"
                        />
                        <!-- Login -->
                        <button
                            class="login-button"
                            style="
                                background: white;
                                padding:10px 20px;
                                border:none;
                                border-radius: 20px;
                                font-size: 14px;
                                font-weight: 600;
                                letter-spacing: -0.5px;
                            "
                        >
                            Login
                        </button>
                    </div>
                    <!-- Error Notification -->
                    <div
                        class="error-notification"
                        style="
                            position: absolute;
                            bottom:0;
                            left:10px;
                            transform: translateY(25px);
                            color:rgb(212, 59, 59);
                        "
                    >
                    </div>
                </div>
			</div>
		<div>
	</body>
</html>


<script
    src="index.js"
>

</script>
