<html>
    <head>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    </head>
    <body
        style="
            margin:0;
            font-family: Roboto;
        "
    >
        <!-- Tweet -->
        <div
            class="tweet"
            style="
                padding:20px;
                position:fixed;
                z-index: -1;
            "
        >
            <div
                style="
                    display:flex;
                    border-bottom: 1px solid grey;
                    padding-bottom:20px;
                "
            >
                <!-- Content Container-->
                <div
                    style="
                        flex:1;
                        display: flex;
                        flex-direction: column;
                        gap:10px
                    "
                >
                    <!-- Top -->
                    <div
                        style="
                            display: flex;
                            font-weight: 700;
                            gap:10px
                        "
                    >
                        <div
                            class="tweet-name"
                        >
                            Name
                        </div>
                        <div
                            class="tweet-datetime"
                        >
                            Datetime
                        </div>
                    </div>
                    <!-- Bottom -->
                    <div
                        class="tweet-content"
                    >
                        Content
                    </div>
                </div>
                <!-- Trash -->
                <div
                    class="tweet-trash"
                    style="
                    "
                >
                    <i class="fa-solid fa-trash"></i>
                </div>
            </div>
        </div>
        <!-- Master container -->
        <div
            style="
                width:100%;
                height:100%;
                background:black;
                display: flex;
                color:white;
                position: fixed;
            "
        >
            <!-- Left Navigation -->
            <div
                class="navigation-container"
                style="
                    background:black;
                    height:100%;
                    flex:1;
                    padding:20px;
                    display: flex;
                    flex-direction: column;
                    gap:10px;
                    border-right:1px solid grey;
                "
            >
                <!-- Navigation -->
                <div
                    class="navigation"
                    style="
                        background:black;
                        display: flex;
                        padding:10px;
                        gap:10px;
                        cursor: pointer;
                    "
                >
                    <!-- Icon -->
                    <div>
                        <i class="fa-solid fa-user"></i>
                    </div>
                    <!-- Label -->
                    <div
                        class="navigation-label"
                    >
                        User
                    </div>
                </div>
            
            </div>
            <!-- Right Container -->
            <div
                style="
                    background:black;
                    height:100%;
                    flex:4;
                    display: flex;
                    flex-direction: column;
                "
            >
                <!-- Input Container -->
                <div
                    style="
                        padding:10px;
                        display: flex;
                        flex-direction: column;
                        gap:10px;
                    "
                >
                    <!-- Input -->
                    <div
                        style="
                            width:100%;                        
                        "
                    >
                        <textarea
                            class="textarea-input"
                            placeholder="Write something..."
                            style="
                                height:80px;
                                background:transparent;
                                width:100%;  
                                outline:none;
                                border:none;
                                resize:none;
                                border-bottom: 1px solid grey;    
                                color:white; 
                                font-family: Roboto;              
                            "
                        ></textarea>
                    </div>
                    <!-- Post Button -->
                     <div
                        class="button-post"
                        style="
                            display: flex;
                            justify-content: end;
                            cursor: pointer;
                            opacity: 50%;
                            transition:all 0.2s;
                        "
                     >
                        <button
                            style="
                                background:white;
                                padding:10px 20px;
                                font-weight: 600;
                                font-size:14px;
                                border:none;
                                border-radius: 20px;
                            "
                        >
                            Post
                        </button>
                     </div>
                </div>
                <!-- Tweets Container -->
                <div
                    class="tweets-container"
                    style="
                        flex:1;
                        overflow-y: auto;
                    "
                >
                    
                </div>
            </div>
        </div>
    </body>

</html>

<script src="index.js">
    
</script>
